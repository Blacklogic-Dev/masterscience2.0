<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Sessions - Master Science Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body {
      background: linear-gradient(to bottom, #60a5fa, #1e40af, #0a1a33);
      min-height: 100vh;
      font-family: sans-serif;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay-content {
      background: rgba(255,255,255,0.1);
      backdrop-blur: 10px;
      padding: 2rem;
      border-radius: 1rem;
      width: 90%;
      max-width: 500px;
      color: white;
    }

    .form-input {
      background-color: rgba(255,255,255,0.2);
      backdrop-blur: 5px;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      color: white;
      width: 100%;
      margin-bottom: 1rem;
    }

    .form-btn {
      background-color: #60a5fa;
      color: #0a1a33;
      font-weight: bold;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      width: 100%;
      transition: all 0.3s;
    }

    .form-btn:hover {
      background-color: #1e40af;
      color: white;
    }

    .like-btn {
      background-color: #fff;
      color: #1e40af;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .like-btn.liked {
      background-color: #1e40af;
      color: white;
    }

    .comment-section textarea {
      background-color: rgba(255,255,255,0.2);
      backdrop-blur: 5px;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      color: white;
      width: 100%;
      margin-bottom: 0.5rem;
      resize: none;
    }

    .comment-btn {
      background-color: #60a5fa;
      color: #0a1a33;
      font-weight: bold;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      width: 100%;
      transition: all 0.3s;
    }

    .comment-btn:hover {
      background-color: #1e40af;
      color: white;
    }
  </style>
</head>
<body>

  <!-- Pre-access Overlay -->
  <div class="overlay" id="preAccess">
    <div class="overlay-content">
      <h2 class="text-xl font-bold mb-4">Enter Student Details</h2>
      <input type="text" id="studentId" placeholder="Student ID" class="form-input" required>
      <input type="text" id="studentName" placeholder="Full Name" class="form-input" required>
      <select id="studentGrade" class="form-input" required>
        <option value="">Select Grade</option>
        <option value="Grade 9">Grade 9</option>
        <option value="Grade 10">Grade 10</option>
        <option value="Grade 11">Grade 11</option>
        <option value="Grade 12">Grade 12</option>
      </select>
      <input type="text" id="stream" placeholder="Stream (if applicable)" class="form-input">
      <button id="enterBtn" class="form-btn">Enter Live Session</button>
    </div>
  </div>

  <div class="w-full max-w-6xl mx-auto p-4 hidden" id="mainContent">

    <!-- Top Banner -->
    <div class="top-banner text-white text-2xl font-bold mb-6 text-center">
      Live Sessions - Master Science Hub
    </div>

    <!-- Embedded YouTube Live Video -->
    <div class="mb-6">
      <iframe id="liveVideo" class="w-full h-96 md:h-[500px] rounded-xl shadow-lg" 
              src="https://www.youtube.com/embed/YOUR_LIVE_VIDEO_ID_HERE" 
              title="Live Session" frameborder="0" allowfullscreen>
      </iframe>
    </div>

    <!-- Like Button -->
    <div class="mb-6">
      <button class="like-btn" id="likeBtn">
        <i class="fas fa-thumbs-up"></i> Like <span id="likeCount">0</span>
      </button>
    </div>

    <!-- Comment Section -->
    <div class="comment-section bg-white/20 backdrop-blur-md rounded-2xl p-6 shadow-lg">
      <h2 class="text-white text-xl font-bold mb-4">Comments / Questions</h2>
      <textarea id="commentMessage" placeholder="Write your comment..." rows="4"></textarea>
      <button id="sendComment" class="comment-btn">Send to WhatsApp</button>
    </div>

  </div>

  <script>
    const preAccess = document.getElementById('preAccess');
    const mainContent = document.getElementById('mainContent');
    const enterBtn = document.getElementById('enterBtn');

    enterBtn.addEventListener('click', () => {
      const studentId = document.getElementById('studentId').value.trim();
      const studentName = document.getElementById('studentName').value.trim();
      const studentGrade = document.getElementById('studentGrade').value;
      const stream = document.getElementById('stream').value.trim();

      if(!studentId || !studentName || !studentGrade){
        alert("Please fill all required fields");
        return;
      }

      // Send notification to WhatsApp
      const text = `New Live Access:%0AStudent ID: ${studentId}%0AName: ${studentName}%0AGrade: ${studentGrade}%0AStream: ${stream}`;
      const whatsappURL = `https://api.whatsapp.com/send?phone=27606614909&text=${encodeURIComponent(text)}`;
      window.open(whatsappURL, '_blank');

      // Hide overlay & show main content
      preAccess.style.display = 'none';
      mainContent.classList.remove('hidden');
    });

    // Like Button Functionality
    const likeBtn = document.getElementById('likeBtn');
    const likeCount = document.getElementById('likeCount');
    let likes = 0;

    likeBtn.addEventListener('click', () => {
      likes++;
      likeCount.textContent = likes;
      likeBtn.classList.add('liked');
    });

    // Comment Section WhatsApp
    const sendComment = document.getElementById('sendComment');
    sendComment.addEventListener('click', () => {
      const comment = document.getElementById('commentMessage').value.trim();
      if(!comment){
        alert("Please enter a comment");
        return;
      }
      const text = `Live Session Comment:%0A${comment}`;
      const whatsappURL = `https://api.whatsapp.com/send?phone=27606614909&text=${encodeURIComponent(text)}`;
      window.open(whatsappURL, '_blank');
      document.getElementById('commentMessage').value = '';
    });
  </script>

</body>
</html>
